name: chauffeur_mobile
description: CRH chauffeur Android app for sending live reports to observer dashboard.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "../assets/app_icon.png"
  adaptive_icon_foreground: "../assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21
